name: Build Hermes Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: hermes-arm64-v8a
          path: flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: hermes-armeabi-v7a
          path: flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: hermes-x86_64
          path: flutter/build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            flutter/build/app/outputs/flutter-apk/app-x86_64-release.apk
          generate_release_notes: true
