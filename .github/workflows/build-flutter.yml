name: Build Hermes Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install deps
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-arm64-v8a
          path: flutter/build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-armeabi-v7a
          path: flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-x86_64
          path: flutter/build/app/outputs/flutter-apk/app-x86_64-debug.apk
