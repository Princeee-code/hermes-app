name: Build Hermes Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate fresh Android project
        run: |
          # Create temp flutter project to get correct Android template
          cd /tmp
          flutter create --project-name hermes_app --org com.hermes temp_hermes 2>&1
          # Replace our android/ with the fresh one
          rm -rf "$GITHUB_WORKSPACE/flutter/android"
          cp -r /tmp/temp_hermes/android "$GITHUB_WORKSPACE/flutter/android"

      - name: Install deps
        working-directory: flutter
        run: flutter pub get

      - name: Build APK  
        working-directory: flutter
        run: flutter build apk --debug --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-arm64-v8a
          path: flutter/build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-armeabi-v7a
          path: flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-x86_64
          path: flutter/build/app/outputs/flutter-apk/app-x86_64-debug.apk
