name: Build Hermes Flutter APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate fresh Android project
        run: |
          cd /tmp
          flutter create --project-name hermes_app --org com.hermes temp_hermes
          rm -rf "$GITHUB_WORKSPACE/flutter/android"
          cp -r /tmp/temp_hermes/android "$GITHUB_WORKSPACE/flutter/android"

      - name: Install deps
        working-directory: flutter
        run: flutter pub get

      - name: Analyze
        working-directory: flutter
        continue-on-error: true
        run: flutter analyze 2>&1 | tee analyze.log

      - name: Build APK
        working-directory: flutter
        run: |
          flutter build apk --debug --split-per-abi 2>&1 | tee build.log; EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "## ❌ Build Failed — Error Output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -80 build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT_CODE

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: flutter/*.log

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-arm64-v8a
          path: flutter/build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-armeabi-v7a
          path: flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-x86_64
          path: flutter/build/app/outputs/flutter-apk/app-x86_64-debug.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Hermes v${{ github.ref_name }}
          body: |
            ## Hermes AI Chat App
            
            AI chat client connecting to your local OmniRoute gateway, Hindsight memory, and system services.
            
            ### What's new
            - First release of the Hermes Flutter chat app
            - Dark amethyst/gold theme
            - Chat with Hermes AI assistant via local OmniRoute
            - System status dashboard
            - Conversations (coming soon)
          files: |
            flutter/build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
            flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
            flutter/build/app/outputs/flutter-apk/app-x86_64-debug.apk
          generate_release_notes: true
